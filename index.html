<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily Tracker" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title></title>

  <!--
    Import map: resolves bare specifiers for packages that are served
    externally (not bundled). In production these imports are left as-is
    in the output ESM files and resolved here at runtime.
    In development Vite resolves these from node_modules instead.
  -->
  <script type="importmap">
  {
    "imports": {
      "react":                 "https://cdn.jsdelivr.net/npm/react@18.2.0/+esm",
      "react-dom":             "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/+esm",
      "react-dom/client":      "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/client/+esm",
      "motion":                "https://cdn.jsdelivr.net/npm/motion@12/+esm",
      "motion/react":          "https://cdn.jsdelivr.net/npm/motion@12/react/+esm"
    }
  }
  </script>

</head>
<body>
  <div id="root"></div>
  <!-- Vite injects the module script tag here during build -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
