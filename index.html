<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily Tracker" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title></title>

  <!--
    Import map: resolves bare specifiers in source files and in the
    auto-generated 'react/jsx-runtime' import that TypeScript emits.
    No Babel. No build step.

    The Service Worker (sw.js) intercepts every request for src/*.js,
    runs TypeScript's transpileModule({ jsx: ReactJSX }) on it, and
    returns plain JS — so source files may contain real JSX syntax.
  -->
  <script type="importmap">
  {
    "imports": {
      "react":                 "https://cdn.jsdelivr.net/npm/react@18.2.0/+esm",
      "react/jsx-runtime":     "https://cdn.jsdelivr.net/npm/react@18.2.0/jsx-runtime/+esm",
      "react/jsx-dev-runtime": "https://cdn.jsdelivr.net/npm/react@18.2.0/jsx-dev-runtime/+esm",
      "react-dom":             "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/+esm",
      "react-dom/client":      "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/client/+esm",
      "@emotion/css":          "https://cdn.jsdelivr.net/npm/@emotion/css@11/+esm"
    }
  }
  </script>

  <script type="module">
    /*
     * Boot sequence
     * ─────────────
     * The Service Worker must be controlling this page BEFORE we import
     * any JSX source file, otherwise the browser fetches raw JSX which
     * it cannot parse.
     *
     * 1. Register sw.js.
     * 2. If the SW is not yet the controller (first visit), wait for
     *    the 'controllerchange' event — emitted after the SW calls
     *    skipWaiting() + clients.claim() at the end of its install/activate.
     * 3. Dynamically import main.js — this fetch now goes through the SW,
     *    which returns transpiled JS.
     *
     * On every subsequent visit navigator.serviceWorker.controller is
     * already set, so the wait is skipped and the app boots instantly.
     */
    async function boot() {
      if ('serviceWorker' in navigator) {
        await navigator.serviceWorker.register('./sw.js');
        if (!navigator.serviceWorker.controller) {
          await new Promise((resolve) => {
            navigator.serviceWorker.addEventListener('controllerchange', resolve, { once: true });
          });
        }
      }
      await import('./src/main.js');
    }
    boot();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
