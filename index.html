<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily Tracker" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title>Daily Tracker</title>

  <!--
    Import map: resolves bare specifiers like 'react', 'react/jsx-runtime',
    'react-dom/client' to jsDelivr ESM URLs at runtime.
    No Babel or any build step required — source files are plain ES modules
    that call jsx() / jsxs() from react/jsx-runtime directly.
  -->
  <script type="importmap">
  {
    "imports": {
      "react":                 "https://cdn.jsdelivr.net/npm/react@18.2.0/+esm",
      "react/jsx-runtime":     "https://cdn.jsdelivr.net/npm/react@18.2.0/jsx-runtime/+esm",
      "react/jsx-dev-runtime": "https://cdn.jsdelivr.net/npm/react@18.2.0/jsx-dev-runtime/+esm",
      "react-dom/client":      "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/client/+esm"
    }
  }
  </script>

  <script type="module" src="./src/main.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
